name: articleshelf-e2e

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: articleshelf
      POSTGRES_USER: articleshelf
      POSTGRES_PASSWORD: articleshelf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U articleshelf -d articleshelf"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/articleshelf
      SPRING_DATASOURCE_USERNAME: articleshelf
      SPRING_DATASOURCE_PASSWORD: articleshelf
      FRONTEND_ORIGIN: http://localhost:5173
      JWT_ACCESS_SECRET: dev-articleshelf-access-secret-change-me-please-32bytes
      AUTH_REFRESH_TOKEN_HASH_SECRET: dev-articleshelf-refresh-hash-secret-change-me
      AUTH_COOKIE_SECURE: "false"
      AUTH_COOKIE_SAME_SITE: Lax
      AUTH_CSRF_ENABLED: "false"
      ARTICLESHELF_INITIAL_USER_ENABLED: "true"
      ARTICLESHELF_INITIAL_USERNAME: owner
      ARTICLESHELF_INITIAL_USER_PASSWORD: password123
      ARTICLESHELF_AUTH_RATE_LIMIT_ENABLED: "false"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
