<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" role="img" aria-labelledby="title desc">
  <title id="title">ReadStack システム構成図</title>
  <desc id="desc">GitHub Repository から GitHub Actions を経由して Cloudflare Pages と Render Free Web Service へデプロイし、Render が Supabase PostgreSQL に接続する公開構成図。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="note" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1e3a8a" flood-opacity="0.12" />
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrowTeal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f766e" />
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed" />
    </marker>
    <style>
      .title { font: 800 68px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 600 26px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #64748b; }
      .card-title { font: 700 26px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .card-subtitle { font: 500 18px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .header-text { font: 700 24px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .body-text { font: 700 19px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .small-text { font: 500 16px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .tiny-text { font: 600 14px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #2563eb; }
      .label-text { font: 700 15px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .bullet-text { font: 600 18px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .pill { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; }
      .stroke-blue { stroke: #93c5fd; }
      .stroke-purple { stroke: #d8b4fe; }
      .stroke-green { stroke: #a7f3d0; }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)" />

  <text x="800" y="92" text-anchor="middle" class="title">ReadStack システム構成図</text>
  <text x="800" y="138" text-anchor="middle" class="subtitle">(デプロイ構成 / 公開構成)</text>

  <g filter="url(#shadow)">
    <rect x="555" y="180" width="490" height="120" rx="22" fill="#ffffff" stroke="#dbeafe" stroke-width="2" />
    <circle cx="638" cy="240" r="38" fill="#111827" />
    <path d="M620 234c0-4 3-7 7-7h22c4 0 7 3 7 7v13c0 4-3 7-7 7h-22c-4 0-7-3-7-7zm10 31c-2 0-4-2-4-4v-3h25v3c0 2-2 4-4 4z" fill="#ffffff" opacity="0.92" />
    <text x="720" y="236" class="card-title">GitHub Repository</text>
    <text x="720" y="276" class="card-subtitle">main branch</text>
  </g>

  <line x1="800" y1="300" x2="800" y2="356" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)" />

  <g filter="url(#shadow)">
    <rect x="555" y="360" width="490" height="120" rx="22" fill="#ffffff" stroke="#bfdbfe" stroke-width="2" />
    <rect x="555" y="360" width="22" height="120" rx="22" fill="url(#blue)" />
    <circle cx="635" cy="422" r="20" fill="none" stroke="#2563eb" stroke-width="4" />
    <circle cx="635" cy="422" r="7" fill="#2563eb" />
    <circle cx="663" cy="452" r="12" fill="none" stroke="#2563eb" stroke-width="4" />
    <circle cx="692" cy="422" r="12" fill="none" stroke="#2563eb" stroke-width="4" />
    <circle cx="720" cy="452" r="12" fill="none" stroke="#2563eb" stroke-width="4" />
    <line x1="650" y1="436" x2="656" y2="443" stroke="#2563eb" stroke-width="4" />
    <line x1="647" y1="413" x2="680" y2="422" stroke="#2563eb" stroke-width="4" />
    <line x1="703" y1="429" x2="712" y2="444" stroke="#2563eb" stroke-width="4" />
    <text x="760" y="418" class="card-title" fill="#2563eb">GitHub Actions</text>
    <text x="760" y="458" class="card-subtitle">Continuous Deployment</text>
  </g>

  <path d="M720 480 L720 530 L520 530 L520 596" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)" />
  <path d="M880 480 L880 530 L1080 530 L1080 596" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)" />

  <g filter="url(#shadow)">
    <rect x="420" y="500" width="170" height="38" rx="19" fill="#2563eb" />
    <text x="505" y="525" text-anchor="middle" class="label-text">main push でCD</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="995" y="500" width="170" height="38" rx="19" fill="#2563eb" />
    <text x="1080" y="525" text-anchor="middle" class="label-text">main push でCD</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="42" y="610" width="190" height="330" rx="24" fill="#ffffff" stroke="#c4b5fd" stroke-width="2" />
    <circle cx="137" cy="680" r="30" fill="#8b5cf6" opacity="0.8" />
    <path d="M91 784c9-37 84-37 93 0" fill="#8b5cf6" opacity="0.55" />
    <text x="137" y="816" text-anchor="middle" class="body-text">ユーザー</text>
    <text x="137" y="852" text-anchor="middle" class="small-text">Browser</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="372" y="620" width="304" height="316" rx="26" fill="#ffffff" class="stroke-blue" stroke-width="2" />
    <rect x="372" y="620" width="304" height="58" rx="26" fill="url(#blue)" />
    <text x="524" y="658" text-anchor="middle" class="header-text">Frontend</text>
    <path d="M500 725c12-35 64-35 76 0c17 1 29 13 29 29c0 17-14 31-31 31H473c-22 0-40-17-40-38c0-19 14-34 33-37c7-15 21-25 34-25z" fill="#f59e0b" opacity="0.95" />
    <text x="524" y="846" text-anchor="middle" class="body-text">Cloudflare Pages</text>
    <rect x="405" y="878" width="238" height="40" rx="12" class="pill" />
    <text x="524" y="904" text-anchor="middle" class="small-text">Vue.js / Vite</text>
    <rect x="405" y="926" width="238" height="40" rx="12" class="pill" />
    <text x="524" y="952" text-anchor="middle" class="small-text">SPA</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="620" width="304" height="316" rx="26" fill="#ffffff" class="stroke-purple" stroke-width="2" />
    <rect x="860" y="620" width="304" height="58" rx="26" fill="url(#purple)" />
    <text x="1012" y="658" text-anchor="middle" class="header-text">Backend API</text>
    <path d="M982 740h46c20 0 36 16 36 36c0 15-9 29-22 35v64h-62v-135z" fill="#7c3aed" />
    <rect x="965" y="740" width="44" height="44" fill="#8b5cf6" />
    <text x="1012" y="846" text-anchor="middle" class="body-text">Render Free</text>
    <text x="1012" y="878" text-anchor="middle" class="body-text">Web Service</text>
    <rect x="893" y="878" width="238" height="40" rx="12" class="pill" />
    <text x="1012" y="904" text-anchor="middle" class="small-text">Spring Boot</text>
    <rect x="893" y="926" width="238" height="40" rx="12" class="pill" />
    <text x="1012" y="952" text-anchor="middle" class="small-text">REST API</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1308" y="620" width="230" height="316" rx="26" fill="#ffffff" class="stroke-green" stroke-width="2" />
    <rect x="1308" y="620" width="230" height="58" rx="26" fill="url(#green)" />
    <text x="1423" y="658" text-anchor="middle" class="header-text">Database</text>
    <path d="M1400 760l24-34l25 34l-25 34z" fill="#10b981" opacity="0.9" />
    <path d="M1378 782l22-31l23 31l-23 31z" fill="#34d399" opacity="0.86" />
    <text x="1423" y="846" text-anchor="middle" class="body-text">Supabase Free</text>
    <text x="1423" y="878" text-anchor="middle" class="body-text">PostgreSQL</text>
    <rect x="1361" y="926" width="124" height="40" rx="12" class="pill" />
    <text x="1423" y="952" text-anchor="middle" class="small-text">PostgreSQL</text>
  </g>

  <line x1="232" y1="740" x2="356" y2="740" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrowPurple)" />
  <text x="292" y="726" text-anchor="middle" class="tiny-text" fill="#7c3aed">HTTPS</text>

  <line x1="676" y1="740" x2="850" y2="740" stroke="#0f766e" stroke-width="5" marker-end="url(#arrowTeal)" />
  <text x="763" y="710" text-anchor="middle" class="tiny-text" fill="#0f766e">REST API /</text>
  <text x="763" y="732" text-anchor="middle" class="tiny-text" fill="#0f766e">HTTPS</text>

  <line x1="1164" y1="740" x2="1298" y2="740" stroke="#0f766e" stroke-width="5" marker-end="url(#arrowTeal)" />
  <text x="1230" y="710" text-anchor="middle" class="tiny-text" fill="#0f766e">JDBC /</text>
  <text x="1230" y="732" text-anchor="middle" class="tiny-text" fill="#0f766e">PostgreSQL</text>

  <g filter="url(#shadow)">
    <rect x="48" y="975" width="1504" height="158" rx="24" fill="url(#note)" stroke="#93c5fd" stroke-width="2" />
    <circle cx="138" cy="1054" r="46" fill="url(#blue)" />
    <path d="M138 1018c17 0 31 14 31 31c0 11-6 21-16 27l-4 22h-22l5-24c-9-6-15-16-15-25c0-17 14-31 31-31z" fill="#ffffff" opacity="0.96" />
    <text x="138" y="1113" text-anchor="middle" class="header-text" fill="#2563eb">ポイント</text>
    <line x1="260" y1="1006" x2="260" y2="1104" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="318" cy="1026" r="12" fill="#2563eb" />
    <text x="346" y="1032" class="bullet-text">フロントは Cloudflare Pages で公開</text>
    <circle cx="318" cy="1070" r="12" fill="#2563eb" />
    <text x="346" y="1076" class="bullet-text">Spring Boot は Render にデプロイ</text>
    <circle cx="318" cy="1114" r="12" fill="#2563eb" />
    <text x="346" y="1120" class="bullet-text">DB は Supabase PostgreSQL を利用</text>
    <circle cx="882" cy="1026" r="12" fill="#2563eb" />
    <text x="910" y="1032" class="bullet-text">最終形の CD は GitHub Actions を想定</text>
    <circle cx="882" cy="1070" r="12" fill="#2563eb" />
    <text x="910" y="1076" class="bullet-text">初期公開は PaaS の Git 連携でも開始可能</text>
    <circle cx="882" cy="1114" r="12" fill="#2563eb" />
    <text x="910" y="1120" class="bullet-text">Render Free は初回アクセス時に起動待ちが発生しうる</text>
  </g>
</svg>
