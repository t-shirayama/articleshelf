name: CI

on:
  push:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run_all: ${{ steps.scope.outputs.run_all }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v6
      - id: scope
        name: Detect branch scope
        shell: bash
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if [[ "$branch" == "main" || "$branch" == "develop" ]]; then
            echo "run_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_all=false" >> "$GITHUB_OUTPUT"
          fi
      - id: filter
        name: Detect changed areas
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'
            e2e:
              - 'backend/**'
              - 'frontend/**'
              - 'docker-compose*.yml'
              - '.github/workflows/ci.yml'

  backend-check:
    name: Backend check
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.backend == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - name: Run backend static analysis
        run: docker compose run --rm backend mvn clean compile spotbugs:check
      - name: Run backend architecture dependency check
        run: docker compose run --rm backend mvn test -Dtest=CleanArchitectureDependencyTest
      - name: Show db logs on failure
        if: failure()
        run: docker compose logs --tail 200 db

  frontend-check:
    name: Frontend check
    runs-on: ubuntu-latest
    needs: [changes]
    if: ${{ needs.changes.outputs.run_all == 'true' || needs.changes.outputs.frontend == 'true' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend lint
        run: npm run lint
      - name: Run frontend typecheck
        run: npm run typecheck
      - name: Build frontend
        run: npm run build
      - name: Check frontend bundle size
        run: npm run check:bundle

  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    needs: [changes, backend-check, frontend-check]
    if: >-
      ${{
        always()
        && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.backend == 'true')
        && needs.backend-check.result == 'success'
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.frontend != 'true')
          || needs.frontend-check.result == 'success'
        )
      }}
    steps:
      - uses: actions/checkout@v6
      - name: Run backend unit tests with coverage
        run: docker compose run --rm backend mvn -Pcoverage test -Dtest='ArticleTest,PasswordPolicyTest,UsernamePolicyTest,ArticleServiceTest,AuthRateLimiterTest,ApiExceptionHandlerTest,JwtTokenServiceTest,OgpRequestGuardTest,ProductionEnvironmentValidatorTest,AuthAndArticleIntegrationTest'
      - name: Print backend unit coverage summary
        run: |
          awk -F, 'NR>1 {im+=$4; ic+=$5; bm+=$6; bc+=$7; lm+=$8; lc+=$9} END {
            printf "Instruction coverage: %.2f%% (%d/%d)\n", 100*ic/(ic+im), ic, ic+im;
            printf "Branch coverage: %.2f%% (%d/%d)\n", 100*bc/(bc+bm), bc, bc+bm;
            printf "Line coverage: %.2f%% (%d/%d)\n", 100*lc/(lc+lm), lc, lc+lm;
          }' backend/target/site/jacoco/jacoco.csv
      - name: Enforce backend domain/application coverage threshold
        run: |
          awk -F, '
            NR>1 && ($2 ~ /^com\.articleshelf\.domain/ || $2 ~ /^com\.articleshelf\.application/) {
              missed += $8;
              covered += $9;
            }
            END {
              total = covered + missed;
              ratio = total == 0 ? 1 : covered / total;
              printf "Domain/application line coverage: %.2f%% (%d/%d)\n", 100 * ratio, covered, total;
              if (ratio < 0.80) {
                printf "Coverage threshold failed: expected at least 80.00%%\n";
                exit 1;
              }
            }
          ' backend/target/site/jacoco/jacoco.csv
      - name: Show db logs on failure
        if: failure()
        run: docker compose logs --tail 200 db

  frontend-unit:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    needs: [changes, backend-check, frontend-check]
    if: >-
      ${{
        always()
        && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.frontend == 'true')
        && needs.frontend-check.result == 'success'
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.backend != 'true')
          || needs.backend-check.result == 'success'
        )
      }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend unit tests with coverage
        run: npm run test:unit:coverage

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    needs: [changes, backend-unit, frontend-unit]
    if: >-
      ${{
        always()
        && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.backend == 'true')
        && needs.backend-unit.result == 'success'
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.frontend != 'true')
          || needs.frontend-unit.result == 'success'
        )
      }}
    steps:
      - uses: actions/checkout@v6
      - name: Run backend integration tests
        run: docker compose run --rm backend mvn test -Dtest='AuthAndArticleIntegrationTest,JpaArticleRepositoryPostgresIntegrationTest'
      - name: Show db logs on failure
        if: failure()
        run: docker compose logs --tail 200 db

  frontend-integration:
    name: Frontend integration tests
    runs-on: ubuntu-latest
    needs: [changes, backend-unit, frontend-unit]
    if: >-
      ${{
        always()
        && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.frontend == 'true')
        && needs.frontend-unit.result == 'success'
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.backend != 'true')
          || needs.backend-unit.result == 'success'
        )
      }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run frontend integration tests
        run: npm run test:integration

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [changes, backend-integration, frontend-integration]
    if: >-
      ${{
        always()
        && (needs.changes.outputs.run_all == 'true' || needs.changes.outputs.e2e == 'true')
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.backend != 'true')
          || needs.backend-integration.result == 'success'
        )
        && (
          (needs.changes.outputs.run_all != 'true' && needs.changes.outputs.frontend != 'true')
          || needs.frontend-integration.result == 'success'
        )
      }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        run: npm run test:e2e
      - name: Show compose logs on E2E failure
        if: failure()
        working-directory: .
        run: docker compose -p articleshelf-e2e -f docker-compose.e2e.yml logs --tail 300
      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: ignore
