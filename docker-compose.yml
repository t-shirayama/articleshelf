services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: readstack
      POSTGRES_USER: readstack
      POSTGRES_PASSWORD: readstack
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U readstack -d readstack"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/readstack
      SPRING_DATASOURCE_USERNAME: readstack
      SPRING_DATASOURCE_PASSWORD: readstack
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
