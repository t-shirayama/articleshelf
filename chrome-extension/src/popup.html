<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArticleShelf Quick Add</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-section">
        <p class="eyebrow">ArticleShelf</p>
        <h1>Quick Add</h1>
        <p class="copy">Open the current page in ArticleShelf's add-article flow without storing tokens in the extension.</p>
        <p class="app-target">Target: <span id="app-base-url-display">ArticleShelf</span></p>
      </section>

      <section class="popup-section">
        <div class="preview-card">
          <strong id="page-title">Loading current page...</strong>
          <span id="page-url">Preparing draft…</span>
        </div>
        <p id="status-message" class="hint"></p>
        <button id="open-draft" class="button button-primary" type="button">Open draft in ArticleShelf</button>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
